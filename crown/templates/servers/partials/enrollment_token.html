<div class="bg-gray-900 border border-green-800 rounded-xl p-5">
    <h3 class="text-green-400 font-semibold mb-2">Server created!</h3>
    <p class="text-sm text-gray-400 mb-3">Run this on your target server to install the agent:</p>
    <div class="flex items-center gap-2 mb-3">
        <code id="install-cmd" class="flex-1 bg-gray-950 border border-gray-800 rounded-lg px-3 py-2 text-sm text-crown-400 select-all overflow-x-auto">curl -sSL {{ request.scheme }}://{{ request.get_host }}{% url 'install_script' server.enrollment_token %} | bash</code>
        <button onclick="navigator.clipboard.writeText(document.getElementById('install-cmd').textContent)"
                class="bg-gray-800 hover:bg-gray-700 text-gray-300 text-sm px-3 py-2 rounded-lg transition shrink-0">
            Copy
        </button>
    </div>
    <a href="{% url 'dashboard' %}" class="inline-block mt-2 text-sm text-crown-400 hover:text-crown-300">&larr; Back to dashboard</a>
</div>
