{% extends 'base.html' %}

{% block title %}Add Server - ServerCrown{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold mb-6">Add Server</h1>

    <form method="post" hx-post="{% url 'server_add' %}" hx-target="#result" class="space-y-4">
        {% csrf_token %}

        <div>
            <label class="block text-sm text-gray-400 mb-1">Name</label>
            <input type="text" name="name" required
                   class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-gray-100 focus:border-crown-500 focus:outline-none">
        </div>

        <div>
            <label class="block text-sm text-gray-400 mb-1">Tags</label>
            <input type="text" name="tags"
                   class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-gray-100 focus:border-crown-500 focus:outline-none"
                   placeholder="production, web, eu-west">
        </div>

        <div>
            <label class="block text-sm text-gray-400 mb-1">Notes</label>
            <textarea name="notes" rows="3"
                      class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-gray-100 focus:border-crown-500 focus:outline-none"
                      placeholder="Optional notes about this server"></textarea>
        </div>

        <!-- SSH pull mode (optional, for servers that can't connect outbound) -->
        <div class="border border-gray-700 rounded-lg p-4 space-y-3">
            <p class="text-sm text-gray-400 font-medium">SSH Pull Mode <span class="text-gray-600">(optional — for servers behind firewalls)</span></p>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">SSH Host</label>
                    <input type="text" name="ssh_host"
                           class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-gray-100 text-sm focus:border-crown-500 focus:outline-none"
                           placeholder="openport.io">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">SSH Port</label>
                    <input type="number" name="ssh_port" value="22"
                           class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-gray-100 text-sm focus:border-crown-500 focus:outline-none">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">SSH User</label>
                    <input type="text" name="ssh_user"
                           class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-gray-100 text-sm focus:border-crown-500 focus:outline-none"
                           placeholder="root">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">SSH Password</label>
                    <input type="password" name="ssh_password"
                           class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-gray-100 text-sm focus:border-crown-500 focus:outline-none">
                </div>
            </div>
        </div>

        <button type="submit"
                class="w-full bg-crown-500 hover:bg-crown-600 text-gray-900 font-medium px-4 py-2 rounded-lg transition">
            Create Server
        </button>
    </form>

    <div id="result" class="mt-6"></div>
</div>
{% endblock %}
